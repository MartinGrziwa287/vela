name: Pi Image Release (reusable)

on:
  workflow_call:
    inputs:
      image-prefix:
        required: true
        type: string
        description: "Präfix des von pi-gen erzeugten Image-Namens, z. B. smart-panel"

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-image:
    needs: build-frontend
    runs-on: [self-hosted, pi-gen]
    steps:
      - name: Root-eigene Artefakte vor dem Checkout entfernen
        # pi-gen/output/, pi-gen/pi-gen-src/ und die Bundle-Stage werden von
        # build.sh als root befüllt (sudo bash build.sh) und sind gitignored.
        # actions/checkout@v4 versucht vor dem Checkout ein `git clean -ffdx`
        # auf dem Arbeitsverzeichnis des persistenten Self-Hosted-Runners und
        # schlägt dabei mit EACCES fehl, wenn root-eigene Dateien aus einem
        # vorherigen Lauf noch dort liegen. Deshalb muss dieser Schritt VOR
        # dem Checkout laufen — der spätere "Altes Output-Verzeichnis
        # leeren"-Schritt kommt zu spät, weil actions/checkout@v4 bereits
        # vorher fehlschlägt.
        run: |
          sudo rm -rf "${{ github.workspace }}/pi-gen/output"
          sudo rm -rf "${{ github.workspace }}/pi-gen/pi-gen-src"
          sudo rm -rf "${{ github.workspace }}/pi-gen/stage-smart-panel/01-install/bundle"
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Altes Output-Verzeichnis leeren
        run: sudo rm -rf pi-gen/output
      - name: Pi-Image bauen
        working-directory: pi-gen
        env:
          IMAGE_VERSION: ${{ github.ref_name }}
        # sudo setzt standardmäßig die Umgebung zurück und reicht IMAGE_VERSION nicht an
        # den root-Prozess durch — --preserve-env sorgt dafür, dass build.sh die vom
        # Workflow gesetzte Version tatsächlich sieht (sonst fällt es stillschweigend
        # auf das Datum zurück, ohne Fehler).
        run: sudo --preserve-env=IMAGE_VERSION bash build.sh
      - name: GitHub Release mit Image erstellen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IMAGE_FILE=$(ls pi-gen/output/*${{ inputs.image-prefix }}*.zip 2>/dev/null | head -1)
          if [ -z "$IMAGE_FILE" ]; then
            echo "Kein Image unter pi-gen/output/*${{ inputs.image-prefix }}*.zip gefunden"
            exit 1
          fi
          gh release create "${{ github.ref_name }}" "$IMAGE_FILE" \
            --title "${{ github.ref_name }}" \
            --notes "Automatisch gebautes Pi-Image für ${{ github.ref_name }}"
