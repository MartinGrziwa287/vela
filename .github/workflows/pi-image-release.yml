name: Pi Image Release (reusable)

on:
  workflow_call:
    inputs:
      image-prefix:
        required: true
        type: string
        description: "Präfix des von pi-gen erzeugten Image-Namens, z. B. smart-panel"

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-image:
    needs: build-frontend
    runs-on: [self-hosted, pi-gen]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
      - name: Pi-Image bauen
        working-directory: pi-gen
        run: sudo bash build.sh
      - name: GitHub Release mit Image erstellen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          IMAGE_FILE=$(ls pi-gen/output/*${{ inputs.image-prefix }}*.zip 2>/dev/null | head -1)
          if [ -z "$IMAGE_FILE" ]; then
            echo "Kein Image unter pi-gen/output/*${{ inputs.image-prefix }}*.zip gefunden"
            exit 1
          fi
          gh release create "${{ github.ref_name }}" "$IMAGE_FILE" \
            --title "${{ github.ref_name }}" \
            --notes "Automatisch gebautes Pi-Image für ${{ github.ref_name }}"
